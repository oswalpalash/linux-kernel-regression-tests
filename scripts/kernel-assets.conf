# Guest kernel assets — oriented toward *finding bugs* (kernelCTF / syz-style),
# not matching a particular stable series.
#
# Source of truth (KASAN mainline):
#   https://syzkaller.appspot.com/upstream/manager/ci-upstream-kasan-gce
# Refresh: copy the top "kernel image" + "disk image" links from that table.

KERNEL_MODE="${KERNEL_MODE:-kasan}"

# --- Default pin: latest ci-upstream-kasan-gce build we verified (2026/07/09) -
# Commit: 2c7c88a412aa  Merge tag 'net-7.2-rc3' ...  (mainline, post-6.19)
KERNEL_LABEL="${KERNEL_LABEL:-mainline 2c7c88a412aa (ci-upstream-kasan-gce 2026-07-09)}"
BZIMAGE_URL="${BZIMAGE_URL:-https://storage.googleapis.com/syzbot-assets/4fa3b4a44e39/bzImage-2c7c88a4.xz}"
SYZBOT_DISK_URL="${SYZBOT_DISK_URL:-https://storage.googleapis.com/syzbot-assets/59698b09a075/disk-2c7c88a4.raw.xz}"

# Override anytime, e.g. older 6.19 release tag:
#   KERNEL_LABEL='Linux 6.19' \
#   BZIMAGE_URL=https://storage.googleapis.com/syzbot-assets/fbd81ea9a06d/bzImage-05f7e89a.xz \
#   ./scripts/run-qemu-repros.sh

# Turn KASAN / WARN / oops into sticky panics for attribution via serial.
KERNEL_APPEND_EXTRAS="${KERNEL_APPEND_EXTRAS:-oops=panic panic_on_warn=1 panic=0 sysctl.kernel.panic_on_warn=1 sysctl.kernel.softlockup_panic=1}"

# KASAN is memory-heavy.
QEMU_MEM="${QEMU_MEM:-4G}"
