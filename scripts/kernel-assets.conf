# Pinned guest kernel/rootfs assets for regression runs.
#
# Source of truth for KASAN images:
#   https://syzkaller.appspot.com/upstream/manager/ci-upstream-kasan-gce
# (Kernel images history table → "kernel image" / "disk image" links)
#
# Refresh tip: pick a row labeled "Linux 6.19" / "Linux 6.18" / latest mainline
# and copy the bzImage-*.xz URL below.

# Mode: kasan (default) boots a syzbot KASAN bzImage on a Debian cloud rootfs.
#        distro boots the stock Debian cloud kernel (weak signal).
KERNEL_MODE="${KERNEL_MODE:-kasan}"

# --- Default pin: Linux 6.19 release (ci-upstream-kasan-gce) ---------------
# Commit: 05f7e89ab973 "Linux 6.19"  (manager row ~2026/02/09)
# Manager: ci-upstream-kasan-gce
KERNEL_LABEL="${KERNEL_LABEL:-Linux 6.19 (05f7e89ab973)}"
BZIMAGE_URL="${BZIMAGE_URL:-https://storage.googleapis.com/syzbot-assets/fbd81ea9a06d/bzImage-05f7e89a.xz}"
SYZBOT_DISK_URL="${SYZBOT_DISK_URL:-https://storage.googleapis.com/syzbot-assets/5be35387384a/disk-05f7e89a.raw.xz}"

# --- Alternates (export before run to override) ----------------------------
# Linux 6.18 release (example; re-check manager history if 404):
#   KERNEL_LABEL='Linux 6.18' \
#   BZIMAGE_URL=https://storage.googleapis.com/syzbot-assets/.../bzImage-....xz
#
# Bleeding-edge mainline from the same manager (as of 2026/07/09):
#   KERNEL_LABEL='mainline 2c7c88a412aa (post-6.19)' \
#   BZIMAGE_URL=https://storage.googleapis.com/syzbot-assets/4fa3b4a44e39/bzImage-2c7c88a4.xz

# Kernel command line extras for instrumented runs.
# panic=0: stay halted so serial oops text is not wiped by a reboot.
# panic_on_warn=1 / oops=panic: turn KASAN reports and WARNs into panics.
KERNEL_APPEND_EXTRAS="${KERNEL_APPEND_EXTRAS:-oops=panic panic_on_warn=1 panic=0 sysctl.kernel.panic_on_warn=1 sysctl.kernel.softlockup_panic=1}"

# KASAN needs RAM; 4G is a practical CI default.
QEMU_MEM="${QEMU_MEM:-4G}"
