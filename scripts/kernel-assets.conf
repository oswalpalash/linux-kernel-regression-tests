# Pinned guest kernel/rootfs assets for regression runs.
# Refresh periodically by scraping a recent syzbot bug that has both assets, e.g.:
#   https://syzkaller.appspot.com/bug?extid=...

# Mode: kasan (default) boots a syzbot KASAN bzImage on a Debian cloud rootfs.
#        distro boots the stock Debian cloud kernel (weak signal, faster SSH-only smoke).
KERNEL_MODE="${KERNEL_MODE:-kasan}"

# Syzbot KASAN-capable bzImage (from upstream fixed-bug assets).
# Pair hash c245a7a7 is a recent public asset with a matching bootable disk too;
# we only need the bzImage when using the Debian cloud rootfs.
BZIMAGE_URL="${BZIMAGE_URL:-https://storage.googleapis.com/syzbot-assets/9fa3eac09ddc/bzImage-c245a7a7.xz}"

# Optional: syzbot root disk (not used in kasan+debian mode; kept for future).
SYZBOT_DISK_URL="${SYZBOT_DISK_URL:-https://storage.googleapis.com/syzbot-assets/8cc90a2ea120/disk-c245a7a7.raw.xz}"

# Kernel command line extras for instrumented runs.
# panic=0: stay halted so serial oops text is not wiped by a reboot.
# panic_on_warn=1 / oops=panic: turn KASAN reports and WARNs into panics.
KERNEL_APPEND_EXTRAS="${KERNEL_APPEND_EXTRAS:-oops=panic panic_on_warn=1 panic=0 sysctl.kernel.panic_on_warn=1 sysctl.kernel.softlockup_panic=1}"

# KASAN needs RAM; 4G is a practical CI default.
QEMU_MEM="${QEMU_MEM:-4G}"
