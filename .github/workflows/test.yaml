name: Run Tests in QEMU VM

on:
  workflow_dispatch:
    inputs:
      sample_size:
        description: 'Number of random repros to compile and run'
        required: false
        default: '32'
  push:
    branches: [main]
    paths:
      - crepros/**
      - compile.sh
      - .github/workflows/test.yaml
  pull_request:
    branches: [main]
    paths:
      - crepros/**
      - compile.sh
      - .github/workflows/test.yaml
  schedule:
    # Weekly smoke regression (full suite is too large for GHA)
    - cron: '0 3 * * 1'

permissions:
  contents: read

concurrency:
  group: qemu-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-in-qemu:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SAMPLE_SIZE: ${{ github.event.inputs.sample_size || '32' }}
      SSH_PORT: '2222'
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker system prune -af || true
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils cloud-image-utils openssh-client \
            gcc-multilib genisoimage cloud-utils

      - name: Build sample of reproducers
        run: |
          set -euo pipefail
          chmod +x ./compile.sh
          n=$(find crepros -maxdepth 1 -type f -name '*.c' | wc -l)
          take=$SAMPLE_SIZE
          if [ "$take" -gt "$n" ]; then take=$n; fi
          # Sample without shell-glob / ARG_MAX issues
          find crepros -maxdepth 1 -type f -name '*.c' -print \
            | awk -v seed="${{ github.run_id }}" 'BEGIN{srand(seed + 0)} {print rand() "\t" $0}' \
            | sort -n | head -n "$take" | cut -f2- > /tmp/sample-list.txt
          echo "Selected $take of $n reproducers"
          mapfile -t sample < /tmp/sample-list.txt
          ./compile.sh --jobs "$(nproc)" --force "${sample[@]}"
          find compiled -type f ! -name '*.err' | wc -l

      - name: Prepare Debian cloud image + cloud-init
        run: |
          set -euo pipefail
          img_url="https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2"
          wget -q --show-progress -O disk.qcow2 "$img_url"
          qemu-img resize disk.qcow2 4G

          ssh-keygen -t ed25519 -N '' -f "${{ github.workspace }}/id_rsa" -C "lkrt-ci"
          PUB=$(cat "${{ github.workspace }}/id_rsa.pub")

          # Indentation-sensitive cloud-config
          cat > user-data <<EOF
          #cloud-config
          hostname: lkrt-ci
          manage_etc_hosts: true
          users:
            - name: debian
              sudo: ALL=(ALL) NOPASSWD:ALL
              shell: /bin/bash
              ssh_authorized_keys:
                - ${PUB}
            - name: root
              ssh_authorized_keys:
                - ${PUB}
          disable_root: false
          ssh_pwauth: false
          packages: []
          runcmd:
            - [ sh, -c, "sed -i 's/^#\\?PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config" ]
            - [ sh, -c, "systemctl restart ssh || systemctl restart sshd || true" ]
          EOF
          # Strip leading spaces from heredoc (we indented for YAML readability in workflow)
          sed -i 's/^          //' user-data

          cat > meta-data <<EOF
          instance-id: lkrt-ci-1
          local-hostname: lkrt-ci
          EOF
          sed -i 's/^          //' meta-data

          cloud-localds seed.iso user-data meta-data
          cat user-data

      - name: Boot QEMU and run sample
        run: |
          set -euo pipefail
          SERIAL_LOG="$RUNNER_TEMP/qemu-serial.log"
          echo "SERIAL_LOG=$SERIAL_LOG" >> "$GITHUB_ENV"

          # Boot the cloud image firmware path (no host -kernel): more reliable
          # across rootfs/kernel skew. TCG is slow but works without nested KVM.
          sudo qemu-system-x86_64 \
            -name lkrt-ci \
            -machine pc,accel=tcg \
            -cpu qemu64 \
            -m 2G \
            -smp 2 \
            -drive file=disk.qcow2,format=qcow2,if=virtio \
            -drive file=seed.iso,format=raw,if=virtio,media=cdrom \
            -netdev user,id=net0,hostfwd=tcp::${SSH_PORT}-:22 \
            -device virtio-net-pci,netdev=net0 \
            -fsdev local,id=fsdev0,path="${{ github.workspace }}/compiled",security_model=none,readonly=on \
            -device virtio-9p-pci,fsdev=fsdev0,mount_tag=repros \
            -display none \
            -serial file:"$SERIAL_LOG" \
            -daemonize

          SSH_BASE=(ssh -i "${{ github.workspace }}/id_rsa"
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
            -o ConnectTimeout=10
            -o LogLevel=ERROR
            -p "$SSH_PORT")

          echo "Waiting for SSH (debian@ then root@)..."
          USER=""
          for i in $(seq 1 90); do
            if "${SSH_BASE[@]}" debian@127.0.0.1 'echo up' 2>/dev/null; then
              USER=debian
              break
            fi
            if "${SSH_BASE[@]}" root@127.0.0.1 'echo up' 2>/dev/null; then
              USER=root
              break
            fi
            sleep 5
          done
          if [ -z "$USER" ]; then
            echo "SSH never came up"
            tail -n 200 "$SERIAL_LOG" || true
            exit 1
          fi
          echo "SSH ready as $USER"

          SSH=("${SSH_BASE[@]}" "${USER}@127.0.0.1")
          # Prefer root for mounts; fall back to sudo -n for debian user
          if [ "$USER" = "root" ]; then
            RSH=("${SSH[@]}")
          else
            RSH=("${SSH[@]}" sudo -n)
          fi

          "${RSH[@]}" mkdir -p /mnt/repros
          "${RSH[@]}" mount -t 9p -o trans=virtio,version=9p2000.L repros /mnt/repros
          "${SSH[@]}" "ls /mnt/repros | wc -l"

          # Run each binary briefly. Non-zero exit is expected for many syz
          # repros; serial log captures oopses. Job fails only if none ran.
          "${RSH[@]}" bash -s <<'EOF'
          set +e
          ran=0
          for test_file in /mnt/repros/*; do
            [ -e "$test_file" ] || continue
            [ -f "$test_file" ] || continue
            case "$test_file" in
              *.err) continue ;;
            esac
            chmod +x "$test_file" 2>/dev/null
            echo "=== RUN $test_file ==="
            dir=$(mktemp -d)
            (cd "$dir" && timeout -s KILL 3 "$test_file")
            rc=$?
            echo "=== EXIT $rc $test_file ==="
            rm -rf "$dir"
            ran=$((ran + 1))
          done
          echo "RAN=$ran"
          if [ "$ran" -eq 0 ]; then
            echo "No binaries executed"
            exit 1
          fi
          exit 0
          EOF

      - name: Display QEMU serial output
        if: always()
        run: |
          if [ -n "${SERIAL_LOG:-}" ] && [ -f "$SERIAL_LOG" ]; then
            echo "---- QEMU serial (last 200 lines) ----"
            tail -n 200 "$SERIAL_LOG"
          fi

      - name: Upload serial log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-serial
          path: ${{ env.SERIAL_LOG }}
          if-no-files-found: ignore
          retention-days: 14
