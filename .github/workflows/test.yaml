name: Run Tests in QEMU VM

# Compile each C repro *inside* a QEMU guest and run it with a short timeout.
# Sharded across runners. Guest panics (common with syz repros) reboot and
# resume; the offending repro is recorded as GUEST_CRASH.

on:
  workflow_dispatch:
    inputs:
      shard_count:
        description: 'Number of parallel shards covering all crepros'
        required: false
        default: '32'
      run_timeout:
        description: 'Per-repro run timeout seconds inside the guest'
        required: false
        default: '5'
      limit_per_shard:
        description: 'Max sources per shard (0 = all assigned to that shard)'
        required: false
        default: '0'
  push:
    branches: [main]
    paths:
      - crepros/**
      - scripts/**
      - .github/workflows/test.yaml
  pull_request:
    branches: [main]
    paths:
      - crepros/**
      - scripts/**
      - .github/workflows/test.yaml
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

concurrency:
  group: qemu-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.set.outputs.shards }}
      shard_count: ${{ steps.set.outputs.shard_count }}
      run_timeout: ${{ steps.set.outputs.run_timeout }}
      limit: ${{ steps.set.outputs.limit }}
    steps:
      - id: set
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SHARD_COUNT: ${{ github.event.inputs.shard_count }}
          INPUT_RUN_TIMEOUT: ${{ github.event.inputs.run_timeout }}
          INPUT_LIMIT: ${{ github.event.inputs.limit_per_shard }}
        run: |
          set -euo pipefail
          SC="${INPUT_SHARD_COUNT:-32}"
          RT="${INPUT_RUN_TIMEOUT:-5}"
          LIM="${INPUT_LIMIT:-0}"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            SC=2
            LIM=20
          fi
          python3 -c "import json,sys; n=int(sys.argv[1]); print(f'shard_count={n}'); print('shards='+json.dumps(list(range(n))))" "$SC" >> "$GITHUB_OUTPUT"
          echo "run_timeout=$RT" >> "$GITHUB_OUTPUT"
          echo "limit=$LIM" >> "$GITHUB_OUTPUT"
          echo "Planned shards=$SC run_timeout=$RT limit=$LIM"

  test-in-qemu:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.plan.outputs.shards) }}
    env:
      SHARD_INDEX: ${{ matrix.shard }}
      SHARD_COUNT: ${{ needs.plan.outputs.shard_count }}
      RUN_TIMEOUT: ${{ needs.plan.outputs.run_timeout }}
      LIMIT: ${{ needs.plan.outputs.limit }}
      SSH_PORT: '2222'
      ARTIFACT_DIR: ${{ github.workspace }}/.qemu-run
      CLOUD_IMAGE_CACHE: ${{ runner.temp }}/debian-12-genericcloud-amd64.qcow2
    steps:
      - uses: actions/checkout@v4

      # Lightweight free-space (full maximize-build-space is overkill now).
      - name: Free some disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            "$AGENT_TOOLSDIRECTORY" || true
          df -h

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils cloud-image-utils openssh-client \
            genisoimage cloud-utils
          sudo chmod 666 /dev/kvm 2>/dev/null || true

      - name: Cache Debian cloud image
        uses: actions/cache@v4
        with:
          path: ${{ env.CLOUD_IMAGE_CACHE }}
          key: debian-12-genericcloud-amd64-qcow2-v1

      - name: Run shard in QEMU (compile + exec in guest, reboot on panic)
        run: |
          chmod +x scripts/run-qemu-repros.sh scripts/guest-run-repros.sh
          ./scripts/run-qemu-repros.sh

      - name: Upload shard results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repro-results-shard-${{ matrix.shard }}
          path: |
            .qemu-run/repro-results.tsv
            .qemu-run/panics.tsv
            .qemu-run/crashes/**
            .qemu-run/serial/**
            .qemu-run/shard-list.txt
            .qemu-run/guest-stderr.log
          if-no-files-found: ignore
          retention-days: 14

  summarize:
    needs: [plan, test-in-qemu]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all shard results
        uses: actions/download-artifact@v4
        with:
          pattern: repro-results-shard-*
          path: results
          merge-multiple: false

      - name: Merge summary
        run: |
          python3 <<'PY'
          import collections, os, pathlib
          root = pathlib.Path("results")
          c = collections.Counter()
          rows = 0
          shards = 0
          panics = []
          for tsv in root.rglob("repro-results.tsv"):
              shards += 1
              with tsv.open() as f:
                  next(f, None)
                  for line in f:
                      parts = line.rstrip("\n").split("\t")
                      if len(parts) >= 2:
                          c[parts[1]] += 1
                          rows += 1
                          if parts[1] in ("PANIC", "GUEST_CRASH"):
                              title = parts[4] if len(parts) > 4 else ""
                              report = parts[5] if len(parts) > 5 else ""
                              panics.append((parts[0], parts[1], title, report, str(tsv)))
          print(f"shards_with_results={shards}")
          print(f"total_repros={rows}")
          for k, v in sorted(c.items(), key=lambda kv: (-kv[1], kv[0])):
              print(f"{k}: {v}")
          print(f"panic_or_crash_rows={len(panics)}")
          for repro, status, title, report, src in panics[:50]:
              print(f"  {status:12} {repro}: {title[:140]}")
          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a") as out:
                  out.write("### QEMU repro suite\n\n")
                  out.write(f"- Shards with results: **{shards}**\n")
                  out.write(f"- Repros processed: **{rows}**\n")
                  out.write(f"- Panics / guest crashes: **{len(panics)}**\n\n")
                  out.write("| status | count |\n|---|---:|\n")
                  for k, v in sorted(c.items(), key=lambda kv: (-kv[1], kv[0])):
                      out.write(f"| {k} | {v} |\n")
                  if panics:
                      out.write("\n### Panic attribution (who / why)\n\n")
                      out.write("| repro | status | title |\n|---|---|---|\n")
                      for repro, status, title, report, src in panics[:100]:
                          t = (title or "").replace("|", "\\|")[:160]
                          out.write(f"| `{repro}` | {status} | {t} |\n")
                      out.write(
                          "\nFull serial excerpts are in the `repro-results-shard-*` "
                          "artifacts under `crashes/*.md`.\n"
                      )
          if rows == 0:
              raise SystemExit("No repro results collected from any shard")
          PY
