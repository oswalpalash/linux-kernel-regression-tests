name: Run Tests in QEMU VM

on:
  workflow_dispatch:
    inputs:
      sample_size:
        description: 'Number of random repros to compile and run'
        required: false
        default: '32'
  push:
    branches: [main]
    paths:
      - crepros/**
      - compile.sh
      - scripts/**
      - .github/workflows/test.yaml
  pull_request:
    branches: [main]
    paths:
      - crepros/**
      - compile.sh
      - scripts/**
      - .github/workflows/test.yaml
  schedule:
    # Weekly smoke regression (full suite is too large for GHA)
    - cron: '0 3 * * 1'

permissions:
  contents: read

concurrency:
  group: qemu-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-in-qemu:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SAMPLE_SIZE: ${{ github.event.inputs.sample_size || '32' }}
      SSH_PORT: '2222'
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker system prune -af || true
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils cloud-image-utils openssh-client \
            gcc-multilib genisoimage cloud-utils
          sudo chmod 666 /dev/kvm 2>/dev/null || true

      - name: Build sample of reproducers
        run: |
          set -euo pipefail
          chmod +x ./compile.sh
          python3 - "$SAMPLE_SIZE" "${{ github.run_id }}" <<'PY' > /tmp/sample-list.txt
          import os, random, sys
          take, seed = int(sys.argv[1]), sys.argv[2]
          files = [
              os.path.join("crepros", f)
              for f in os.listdir("crepros")
              if f.endswith(".c")
          ]
          random.seed(seed)
          random.shuffle(files)
          take = min(take, len(files))
          for f in files[:take]:
              print(f)
          print(f"Selected {take} of {len(files)} reproducers", file=sys.stderr)
          PY
          mapfile -t sample < /tmp/sample-list.txt
          ./compile.sh --jobs "$(nproc)" --force "${sample[@]}"
          find compiled -type f ! -name '*.err' | wc -l

      - name: Prepare Debian cloud image + cloud-init
        run: |
          set -euo pipefail
          img_url="https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2"
          wget -q --show-progress -O disk.qcow2 "$img_url"
          qemu-img resize disk.qcow2 4G

          ssh-keygen -t ed25519 -N '' -f "${{ github.workspace }}/id_rsa" -C "lkrt-ci"
          PUB=$(cat "${{ github.workspace }}/id_rsa.pub")

          cat > user-data <<EOF
          #cloud-config
          hostname: lkrt-ci
          manage_etc_hosts: true
          disable_root: false
          ssh_pwauth: false
          package_update: false
          users:
            - default
            - name: root
              lock_passwd: true
              ssh_authorized_keys:
                - ${PUB}
          write_files:
            - path: /etc/ssh/sshd_config.d/60-lkrt.conf
              permissions: "0644"
              content: |
                PermitRootLogin prohibit-password
                PasswordAuthentication no
                PubkeyAuthentication yes
            - path: /root/.ssh/authorized_keys
              permissions: "0600"
              owner: root:root
              content: |
                ${PUB}
          runcmd:
            - [ bash, -c, "mkdir -p /home/debian/.ssh /root/.ssh /root/repros" ]
            - [ bash, -c, "echo '${PUB}' >> /home/debian/.ssh/authorized_keys && chown -R debian:debian /home/debian/.ssh && chmod 700 /home/debian/.ssh && chmod 600 /home/debian/.ssh/authorized_keys" ]
            - [ bash, -c, "echo '${PUB}' > /root/.ssh/authorized_keys && chmod 600 /root/.ssh/authorized_keys" ]
            - [ systemctl, restart, ssh ]
          EOF
          sed -i 's/^          //' user-data

          cat > meta-data <<EOF
          instance-id: lkrt-ci-${{ github.run_id }}
          local-hostname: lkrt-ci
          EOF
          sed -i 's/^          //' meta-data

          cloud-localds seed.iso user-data meta-data
          cat user-data

      - name: Boot QEMU and run sample
        run: |
          set -euo pipefail
          SERIAL_LOG="$RUNNER_TEMP/qemu-serial.log"
          QEMU_PID_FILE="$RUNNER_TEMP/qemu.pid"
          : > "$SERIAL_LOG"
          echo "SERIAL_LOG=$SERIAL_LOG" >> "$GITHUB_ENV"
          echo "QEMU_PID_FILE=$QEMU_PID_FILE" >> "$GITHUB_ENV"

          ACCEL=tcg
          if [ -r /dev/kvm ]; then ACCEL=kvm; fi
          echo "Using accel=$ACCEL"

          # Stock Debian cloud kernels often lack 9p; copy repros in via scp.
          qemu-system-x86_64 \
            -name lkrt-ci \
            -machine "pc,accel=$ACCEL" \
            -m 2G \
            -smp 2 \
            -drive file=disk.qcow2,format=qcow2,if=virtio \
            -drive file=seed.iso,format=raw,if=virtio,media=cdrom \
            -netdev user,id=net0,hostfwd=tcp::${SSH_PORT}-:22 \
            -device virtio-net-pci,netdev=net0 \
            -display none \
            -serial file:"$SERIAL_LOG" \
            -pidfile "$QEMU_PID_FILE" \
            -daemonize

          SSH_BASE=(ssh -i "${{ github.workspace }}/id_rsa"
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
            -o ConnectTimeout=10
            -o LogLevel=ERROR
            -p "$SSH_PORT")
          SCP_BASE=(scp -i "${{ github.workspace }}/id_rsa"
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
            -o ConnectTimeout=10
            -o LogLevel=ERROR
            -P "$SSH_PORT")

          echo "Waiting for SSH (debian@ then root@)..."
          USER=""
          for i in $(seq 1 90); do
            if "${SSH_BASE[@]}" debian@127.0.0.1 'echo up' 2>/dev/null; then
              USER=debian
              break
            fi
            if "${SSH_BASE[@]}" root@127.0.0.1 'echo up' 2>/dev/null; then
              USER=root
              break
            fi
            sleep 5
          done
          if [ -z "$USER" ]; then
            echo "SSH never came up"
            tail -n 200 "$SERIAL_LOG" || true
            exit 1
          fi
          echo "SSH ready as $USER"

          SSH=("${SSH_BASE[@]}" "${USER}@127.0.0.1")
          # Prefer root so scp/run do not fight ownership. If only debian is
          # available, create the target dir as debian (no sudo) — sudo mkdir
          # would make it root-owned and scp would get Permission denied.
          if [ "$USER" = "root" ]; then
            REMOTE_DIR=/root/repros
            RUN_AS=("${SSH[@]}")
          else
            REMOTE_DIR=/home/debian/repros
            RUN_AS=("${SSH[@]}")
          fi

          "${SSH[@]}" mkdir -p "$REMOTE_DIR"
          "${SCP_BASE[@]}" -r compiled/. "${USER}@127.0.0.1:${REMOTE_DIR}/"
          "${SSH[@]}" "ls '$REMOTE_DIR' | wc -l"

          "${RUN_AS[@]}" env REMOTE_DIR="$REMOTE_DIR" bash -s <<'EOF'
          set +e
          ran=0
          for test_file in "$REMOTE_DIR"/*; do
            [ -e "$test_file" ] || continue
            [ -f "$test_file" ] || continue
            case "$test_file" in
              *.err) continue ;;
            esac
            chmod +x "$test_file" 2>/dev/null
            echo "=== RUN $test_file ==="
            dir=$(mktemp -d)
            (cd "$dir" && timeout -s KILL 3 "$test_file")
            rc=$?
            echo "=== EXIT $rc $test_file ==="
            rm -rf "$dir"
            ran=$((ran + 1))
          done
          echo "RAN=$ran"
          if [ "$ran" -eq 0 ]; then
            echo "No binaries executed"
            exit 1
          fi
          exit 0
          EOF

          if [ -f "$QEMU_PID_FILE" ]; then
            kill "$(cat "$QEMU_PID_FILE")" 2>/dev/null || true
          fi

      - name: Display QEMU serial output
        if: always()
        run: |
          if [ -n "${SERIAL_LOG:-}" ] && [ -f "$SERIAL_LOG" ]; then
            echo "---- QEMU serial (last 200 lines) ----"
            tail -n 200 "$SERIAL_LOG"
          fi

      - name: Upload serial log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-serial
          path: ${{ env.SERIAL_LOG }}
          if-no-files-found: ignore
          retention-days: 14
