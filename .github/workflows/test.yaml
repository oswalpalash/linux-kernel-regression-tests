name: Run Tests in QEMU VM

# Compile each C repro *inside* a QEMU guest and run it with a short timeout.
# The full tree (~45k sources) is partitioned across matrix shards so the suite
# can finish within GitHub Actions job limits.

on:
  workflow_dispatch:
    inputs:
      shard_count:
        description: 'Number of parallel shards covering all crepros'
        required: false
        default: '32'
      run_timeout:
        description: 'Per-repro run timeout seconds inside the guest'
        required: false
        default: '5'
      limit_per_shard:
        description: 'Max sources per shard (0 = all assigned to that shard)'
        required: false
        default: '0'
  push:
    branches: [main]
    paths:
      - crepros/**
      - scripts/**
      - .github/workflows/test.yaml
  pull_request:
    branches: [main]
    paths:
      - crepros/**
      - scripts/**
      - .github/workflows/test.yaml
  schedule:
    # Weekly full suite
    - cron: '0 3 * * 1'

permissions:
  contents: read

concurrency:
  group: qemu-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Generate shard id list so workflow_dispatch can change shard_count.
  plan:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.set.outputs.shards }}
      shard_count: ${{ steps.set.outputs.shard_count }}
      run_timeout: ${{ steps.set.outputs.run_timeout }}
      limit: ${{ steps.set.outputs.limit }}
    steps:
      - id: set
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SHARD_COUNT: ${{ github.event.inputs.shard_count }}
          INPUT_RUN_TIMEOUT: ${{ github.event.inputs.run_timeout }}
          INPUT_LIMIT: ${{ github.event.inputs.limit_per_shard }}
        run: |
          set -euo pipefail
          # Defaults: full coverage in 32 shards, 5s run timeout.
          SC="${INPUT_SHARD_COUNT:-32}"
          RT="${INPUT_RUN_TIMEOUT:-5}"
          LIM="${INPUT_LIMIT:-0}"
          # On pull_request use a tiny smoke so PRs stay cheap.
          if [ "$EVENT_NAME" = "pull_request" ]; then
            SC=2
            LIM=20
          fi
          python3 -c "import json,sys; n=int(sys.argv[1]); print(f'shard_count={n}'); print('shards='+json.dumps(list(range(n))))" "$SC" >> "$GITHUB_OUTPUT"
          echo "run_timeout=$RT" >> "$GITHUB_OUTPUT"
          echo "limit=$LIM" >> "$GITHUB_OUTPUT"
          echo "Planned shards=$SC run_timeout=$RT limit=$LIM"

  test-in-qemu:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.plan.outputs.shards) }}
    env:
      SHARD_INDEX: ${{ matrix.shard }}
      SHARD_COUNT: ${{ needs.plan.outputs.shard_count }}
      RUN_TIMEOUT: ${{ needs.plan.outputs.run_timeout }}
      LIMIT: ${{ needs.plan.outputs.limit }}
      # Each matrix job is a separate runner VM; the same forward port is fine.
      SSH_PORT: '2222'
      ARTIFACT_DIR: ${{ github.workspace }}/.qemu-run
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker system prune -af || true
          df -h

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils cloud-image-utils openssh-client \
            genisoimage cloud-utils
          sudo chmod 666 /dev/kvm 2>/dev/null || true

      - name: Run shard in QEMU (compile + exec in guest)
        run: |
          chmod +x scripts/run-qemu-repros.sh scripts/guest-run-repros.sh
          ./scripts/run-qemu-repros.sh

      - name: Upload shard results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repro-results-shard-${{ matrix.shard }}
          path: |
            .qemu-run/repro-results.tsv
            .qemu-run/serial.log
            .qemu-run/shard-list.txt
          if-no-files-found: ignore
          retention-days: 14

  summarize:
    needs: [plan, test-in-qemu]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all shard results
        uses: actions/download-artifact@v4
        with:
          pattern: repro-results-shard-*
          path: results
          merge-multiple: false

      - name: Merge summary
        run: |
          python3 <<'PY'
          import collections, os, pathlib
          root = pathlib.Path("results")
          c = collections.Counter()
          rows = 0
          shards = 0
          for tsv in root.rglob("repro-results.tsv"):
              shards += 1
              with tsv.open() as f:
                  next(f, None)
                  for line in f:
                      parts = line.rstrip("\n").split("\t")
                      if len(parts) >= 2:
                          c[parts[1]] += 1
                          rows += 1
          print(f"shards_with_results={shards}")
          print(f"total_repros={rows}")
          for k, v in sorted(c.items(), key=lambda kv: (-kv[1], kv[0])):
              print(f"{k}: {v}")
          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a") as out:
                  out.write("### QEMU repro suite\n\n")
                  out.write(f"- Shards with results: **{shards}**\n")
                  out.write(f"- Repros processed: **{rows}**\n\n")
                  out.write("| status | count |\n|---|---:|\n")
                  for k, v in sorted(c.items(), key=lambda kv: (-kv[1], kv[0])):
                      out.write(f"| {k} | {v} |\n")
          if rows == 0:
              raise SystemExit("No repro results collected from any shard")
          PY
