name: Compile reproducers

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max new files to compile (0 = all)'
        required: false
        default: '0'
  push:
    branches: [main]
    paths:
      - crepros/**
      - compile.sh
      - .github/workflows/compile.yml
  pull_request:
    branches: [main]
    paths:
      - crepros/**
      - compile.sh
      - .github/workflows/compile.yml
  schedule:
    # Daily 01:00 UTC — after fetch
    - cron: '0 1 * * *'

permissions:
  contents: read

concurrency:
  group: compile-repros-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: ubuntu-latest
    # Full tree is large; compiling everything can take hours
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker system prune -af || true
          df -h

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-multilib

      - name: Compile reproducers
        run: |
          chmod +x ./compile.sh
          LIMIT="${{ github.event.inputs.limit || '0' }}"
          if [ "$LIMIT" = "0" ] || [ -z "$LIMIT" ]; then
            ./compile.sh --jobs "$(nproc)"
          else
            ./compile.sh --jobs "$(nproc)" --limit "$LIMIT"
          fi

      - name: Upload compile error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compile-errors
          path: compiled/*.err
          if-no-files-found: ignore
          retention-days: 14

      - name: Summary
        if: always()
        run: |
          echo "Compiled binaries: $(find compiled -type f ! -name '*.err' 2>/dev/null | wc -l)"
          echo "Error logs:        $(find compiled -name '*.err' 2>/dev/null | wc -l)"
          df -h
